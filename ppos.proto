syntax = "proto3";

import "google/protobuf/timestamp.proto";

package PPOS;

message Void {
    string session_key=1;
    string group_filter=2;
}

message StringList {
    repeated string list=1;
}

message BinaryData {
        bytes data=1;
}
message wpObject {
    string ops=1;
    string method=2;
    string search_param=3;
    string option=4;
    bool is_new_object=5;
    bool is_deleted=6;
    google.protobuf.Timestamp last_update_date_time=8;
	repeated string fts_column=9;
    string session_key=10;
}

message LexiconRecord {
	wpObject base=1;
	string id=2;
	string code=3;
	string name=4;
    string parent_id=5;
    string synonym_id=6;
    string table_name=7;
}

message TypeRecord {
	LexiconRecord base=1;
    string limit_value=2;
	string default_value=3;

}

message StockTransactionReference {
    wpObject base=1;
    string stock_id=2;
    string transaction_id=3;
}

message TypeRecordList {
    repeated TypeRecord list=1;
}

message PriceCategoryRecord {
	TypeRecord base=1;
    double price=2;
}
message EntityRecord {
	wpObject base=1;
    string id=2;
    string doc_id=3;
    string global_id=4;
    int64 db_link_id=5;
    LexiconRecord register_at=6;
    google.protobuf.Timestamp register_date=7;
    repeated LexiconRecord attributes=8;
    repeated string attribute_set=9;
	string content=10;
}

message PackingRecord {
	wpObject base=1;
    string stock_id=2;
    LexiconRecord pack_type=3;
    string pack_description=4;
    double packsize = 5;
    double selling_price = 6;
	double membership_price = 7;
    double max_discount_percentage = 8;
    double percent_above_cost = 9;
    repeated PriceCategoryRecord price_by_category=10;
    string barcode=11;
}

message StockTaxAndCharges {
	wpObject base=1;
    TypeRecord type=2;
    google.protobuf.Timestamp from_date=3;
	google.protobuf.Timestamp to_date=4;
    double percentage=5;
	double fixed_value=6;
}
message SalesPromotionRecord {
	wpObject base=1;
    string stock_id=2;
    double discount_percentage = 3;
    google.protobuf.Timestamp from_date=4;
    google.protobuf.Timestamp to_date=5;
}

message ComponentRecord {
	wpObject base=1;
    string stock_id=2;
    string component_id=3;
    PackingRecord pack=4;
    double quantity = 5;
    double cost_factor = 6;
}

message LocationRecord {
	EntityRecord base=1;
}

message CompanyRecord {
	LocationRecord base=1;
    double discount=2;
    double credit_term=3; 
	double debit_term=4; 
	double credit_limit=5;
    string purpose_of_sales=6;
    bool is_taxable=7;
}

message PersonRecord {
	CompanyRecord base=1;
	google.protobuf.Timestamp dob=2;
    LexiconRecord blood_type=3;
	LexiconRecord race=4; 
	LexiconRecord religion=5;
	LexiconRecord marital_status=6;
	LexiconRecord gender=7;
	LexiconRecord job=8;
}

message StockRecord {
	EntityRecord base = 1;
    string dispensing_instruction=2;
	string drug_warning=3;
    string no_of_images=4;

    double reorder_level=5;
	double reorder_qty=6;

    bool is_poison=7;
	bool is_pseudo_poison=8;
	bool is_stock_item=9;

    double weighted_avg_cost=10; 
    double latest_cost=11;
	double max_cost=12;
    double average_cost_ppos=13;
    double reward_point_factor=14;
    double qoh=15; 
	double stock_value=16; 
	double qoh_hold=17;
    double promotional_discount=18;
    bool to_convert_packsize=19;
    string fcc=20;
    string display_name=21;

    LexiconRecord type=22;
    LexiconRecord default_selling_pack=23;
    LexiconRecord default_purchase_pack=24;
    string min_profit_margin=25;
    string synonym_to=26;
    repeated PackingRecord pack_records=27;
    repeated StockTaxAndCharges tax_and_charges=28;
    repeated SalesPromotionRecord sales_promotion_list=29;
    repeated ComponentRecord component_list=30;
    repeated LexiconRecord shelf_list=31;
    repeated PersonRecord sales_reps=32;
    string qoh_string=33; //q+l format
    repeated StockCategoryRecord category_list=34;
    repeated string category_hierachy = 35; // for filter matching during print by category. 
    int32 fav_rating=36;
    string parent_id=37;
}

message StockReceiveBatch {
    wpObject base=1;
    string receive_id=2;
    string batch_no=3;
    google.protobuf.Timestamp expiry_date=4;
    double qoh=5;
    string ref_no=6;
    string supplier_name=7;
    string stock_id=8;
    bool has_expiry=9;
}

message StockReceiveBatchList {
    EntityRecord base=1;
    repeated StockReceiveBatch list=2;
}

message StockTransactionRecord {
    StockRecord base=1;
    string pack=2;
    string bonus_pack=3;
    double quantity=4;
    double bonus_qty=5;
    double transaction_price=6; 
    double list_price=7; 
    double discount_amount=8; 
    double srp=9;
    double cost_value=10; 
    double transaction_value=11; 
    double tax_value=12;
    bool is_selling_price_manually_changed=13;
    google.protobuf.Timestamp expiry_date=14;
    string batch_no=15;
    string receive_detail_id=16;
    string promoter_id=17;
    string where=18;
    bool has_expiry=19;
    string instruction=20;
    bool update_all_selling_price=21;
    double pack_size=22; // for stock with pack size
}

message HistoricalStockRecord {
    StockTransactionRecord base=1;
    string transaction_id=2;
    google.protobuf.Timestamp transaction_date=3;
    string ref_no=4;
    string location=6;
    string who=7;
    string reason=8;
    string sales_rep=9;
    double qoh_balance=10;
    google.protobuf.Timestamp date_created=11;
    string batch_no=12;
    google.protobuf.Timestamp expiry_date=13;

}

message DatabaseRecord {
	LexiconRecord base=1;
    string transaction_name=2;
    string db_name=3;
    string script_folder=4;
    string www_folder=5;
    google.protobuf.Timestamp expiry_date=6;
    string group_filter=7;
    string uuid=8;
}

message TerminalRecord {
	LexiconRecord base=1;
    string location=2;
}

message UserRecord {
	PersonRecord base=1;
    repeated int64 user_roles=2; 

    string encrypted_password=3;
    string session_id=4;
    google.protobuf.Timestamp register_date=5;
    string menu_xml=6;
    string application_name=7;
    string schema_name=8;
    string start_up_module=9;
    repeated string allowed_modules=10;

    string max_discount_allowed=11;
    repeated LexiconRecord roles=12;
    repeated LexiconRecord screens=13;
    repeated string roles_set=14;
	repeated string screen_set=15;
    repeated string allowed_db_set=16;
    repeated LexiconRecord allowed_db=17;
}


message LoginSessionRecord {
	wpObject base=1;
    DatabaseRecord database_selected=2;
    TerminalRecord terminal=3;
    UserRecord user=4;
    bool need_update=5;
    google.protobuf.Timestamp expiry_date=6;
    google.protobuf.Timestamp time_in=7;
    google.protobuf.Timestamp time_out=8;
    int64 id = 9;  // sessionID
    string application_name=10;
    string outlet_code=11;
    string outlet_name=12;
    string remark=13;
    string server_name=14;
    string server_os_version=15;
	string server_app_version=16;
	string client_os_version=17;
	string client_app_version=18;
    string system_user=19;
    string working_folder=20;
}

enum EventType {
    ev_unassigned = 0;
    ev_error=1;
    ev_server=2;
    ev_entity=3;
    ev_entity_relationship=4;
    ev_stock=5;
    ev_membership=6;
    ev_membership_point=7;
    ev_customer=8;
    ev_company=9;
    ev_promoter=10;
    ev_salesrep=11;
    ev_passport=12;
    ev_sales=13;
    ev_sales_hold=14;
    ev_sales_order=15;
    ev_sales_quotation=16;
    ev_sales_wholesales=17;
    ev_sales_wholesales_hold=18;
    ev_purchase=19;
    ev_purchase_order=20;
    ev_purchase_hold=21;
    ev_reorder=22;
    ev_accounting=23;
    ev_chat=24;
    ev_info=25;
    ev_num_event=26;
};


message ServerEventMessage {
    message MessageRecord {
	    string code=1;
	    string key=2;
	    string value=3;
    }

	wpObject base=1;
    EventType type=2;
    repeated MessageRecord messages=3;
}

message WorkShiftRecord {
    wpObject base=1;
    string id=2;
    google.protobuf.Timestamp time_end=3;
    google.protobuf.Timestamp time_start=4;
    LoginSessionRecord closed_by=5;
    LoginSessionRecord created_by=6;
    double closing_balance=7;
    double opening_balance=8;
}

//----------------------

enum UserType {
	UserTypeAccount=0;
	UserTypeAdmin=1;
	UserTypeCustomer=2;
	UserTypeMember=3;
	UserTypePromoter=4;
	UserTypeSalesRep=5;
	UserTypeStockist=6;
	UserTypeSupplier=7;
}

message StockSearchParam {
    int64 stock_type=1;
    int64 poison_category=2;
    bool is_poison=3;
    bool is_pseudo_poison=4;
    bool show_cost=5;
}

message Parameter {
    wpObject base=1;
    string command_name=2;
    string table_name=3;
    string id=4;
    string int_param=5;
    string data=6;
    StockSearchParam stock_param=7;
    int64 limit=8;
    int64 offset=9;
}

message SearchParam {
    wpObject base=1;
    string search=2;
    string order_by=3;
    bool is_consumption=4;
    bool is_low_stock=5;
    string key=6;
    string value=7;
    string type=8;
    string id=9;
    string method2=10;
    string option2=11;
    string column=12;
}

message SearchItem {
    wpObject base=1;
    string id=2;
    string code=3;
    string name=4;
    double price=5;
    string gstcode=6;
}

message SearchItemList {
    wpObject base=1;
    string id=2;
    repeated SearchItem list=3;
}

message RequestReport {
    google.protobuf.Timestamp from_date=1;
	google.protobuf.Timestamp to_date=2;
    string type_of_sales=3;
}

message RequestInfoRecord {
    wpObject base=1;
    string question=2;
    string answer=3;
    string user_id=4;
    google.protobuf.Timestamp from_date=5;
    google.protobuf.Timestamp to_date=6;
}

message LabelInputParam {
    wpObject base=1;
    string label=2;
	string type=3;
	string param=4;
	string value=5;
	string start_flag=6;
	string lookup_ops=7;
	string list=8;
	string default_value=9;
    bool use_time_as_it_is=10;
    string sql=11;
}

message MenuDialogParam {
    wpObject base=1;
    string title=2;
    repeated LabelInputParam param_list=3;
}

message MenuActionParam {
    wpObject base=13;
    string name=1;
	string script_name=2;
	string output_type=3;
	string orientation=4;
	string cmd_before=5;
	string cmd_after=6;
	string user_param=7;
	string sql_link=9;
    string sheet_type=10;
    MenuDialogParam dialog=11;
    string result=12;
}

message GetFileParameter {
	string command=1;
	oneof Param {
		string remote_file_name=2;
		SearchParam search_parameter=3;
		RequestReport req_report=4;
		RequestInfoRecord req_info=5;
		MenuActionParam menu_action=6;
	}
	wpObject base=7;
    string session_key=8;
}

message ReturnStatus {
	int64 id =1;
	string description=2;
}

message SQLCommandRecord {
    wpObject base=1;
    string sql=2;
    string sql_select=3;
    string sql_count=4;
}

message SQLCommand {
    wpObject base=1;
	string command=2;
}

message SQLColumnDefinition {
	enum Type {
		INTEGER=0;
		DOUBLE=1;
		DATE=2;
		STRING=3;
	}
	Type type=1;
	string name=2;
}


message SQLColumn {
	oneof data {
		int64 int_value=1;
		double double_value=2;
		string string_value=3;
		bytes binary_value=4;
		bool is_null=5;
	}
}

message SQLRow {
	repeated SQLColumn columns=1;
}

message SQLResult {
	repeated SQLColumnDefinition column_definitions=1;
	repeated SQLRow rows=2;
}

message StringRow {
	repeated string data = 1;
}

message AvailableDB {
	int64 id=2;
	string code=3;
	string name=4;
	bool is_shared_master=5;
	string master_db=6;
	string trans_db=7;
    string group_filter=8;
    google.protobuf.Timestamp expiry_date=9;
    string uuid=10;
}

message AvailableDBList {
	repeated AvailableDB list=1;
}

message AvailableServer {
	int64 id=1;
	string code=2;
    string host_name=3;
    string port_no=4;
	string name=5;
	string master_db=6;
	string trans_db=7;
    string group_filter=8;
    google.protobuf.Timestamp expiry_date=9;    
}

message AvailableServerList {
	repeated AvailableServer list=1;
}

message InterchangeData {
	string session_key = 1;
	bytes serialized = 2;
	string object_type=3;
}

message StringData {
	string session_key = 1;
	string string = 2;
}

message IdParameterWithRating {
	string session_key = 1;
	string string = 2;
    bool order_by_favorite = 3;
}

message ReturnDate {
	google.protobuf.Timestamp date=1;
}

message StringPair {
    string key=1;
    string value=2;
}

message StringPairParameter {
    string key=1;
    string value=2;
    string session_key=3;
}

message StringPairList {
    repeated StringPair list=1;
}

message MessageLayer {
    int32 layer=1;  
    repeated string messages=2;
}

message MessageRecord {
    wpObject base=1;
    string id =2;
    google.protobuf.Timestamp effective_date=3;
    LexiconRecord message_type=4;  // 1=receiptPrinter, 2=customerDisplay
    string priority=5;
    google.protobuf.Timestamp from_date=6;
    google.protobuf.Timestamp to_date=7;
    repeated MessageLayer messages=8;
}

message TableDependencyRecord {
    wpObject base=1;
    string table_name=2;
    string column_name=3;
}

message TranslationTableRecord {
    map<string, StringList> map=1;
    string session_key=2;
}

message OPSTableRowRecord {
    wpObject base=1;
    string table_name=2;
    string key_column_name=3;
    string key_value=4;
    string id=5;
    string parent_id=6;
    string grand_parent_id=7;
    string great_grand_parent_id=8;
    string code=9;
    string name=10;
    string filter_column_name=11;
    string filter_value=12;
    string order_by=13;
    string filter_value_via_registry=14;
    repeated TableDependencyRecord dependencies=15;
}

message ScreenPerspectiveRecord {
    wpObject base=1;
    string screen_name=2;
    string perspective=3;
    string center_pane_name=4;
}

message RowData {
    repeated string column=1;
}

message ReturnData {
    repeated RowData row = 1;
}

message MembershipRecord {
    PersonRecord base=1;
    double point_balance=2;
    string enroll_number=3;
    repeated string dependency_list=4;
}

message PaymentRecord {
    wpObject base=1;
    double amount=2;
    double tendered=3;
    string id=4;       // paymentID
    string sales_id=5;  // if blank, use the SalesRecord id. By itself it should not be blank.
    google.protobuf.Timestamp payment_date=6;
    TypeRecord payment_method=7;  // type 10 - paidBy
    string reference=8;
    CompanyRecord payor=9;
    double reward_point=10;
    google.protobuf.Timestamp date_created=11;
}

message SalesRecord {
    wpObject base=1;
    string id=2;
    string note=3;
    int64 seq_no=4;
    double total_amount=5;
    double rounding=6;
    double tax_value=7;
    double discount_at_total=8;
    double term=9;
    string ref_no=10;
    string remark=11;  // reason for deleting, etc;

    MembershipRecord customer=12;
    PersonRecord promoter=13;
    PersonRecord deliver_to=14;
    UserRecord user=15;
    TerminalRecord terminal=16;

    google.protobuf.Timestamp transaction_date=17;
    TypeRecord sales_type=18;
    repeated StockTransactionRecord list=19;
    repeated PaymentRecord payment_list=20;
    string where=21;
    google.protobuf.Timestamp date_created=22;
    string customer_purchase_id=23;
    bool to_print_order=24;
    bool to_submit_e_invoice=25;
}

message SalesRecordList {
    wpObject base=1;
    google.protobuf.Timestamp from_date=2;
    google.protobuf.Timestamp to_date=3;
    string limit=4;
    string offset=5;
    string sales_type_id=6;
    repeated SalesRecord list=7;
    string id=8;
}

message PurchaseRecord {
    wpObject base=1;
    string id=2;
    string note=3;
    string ref_no=4;
    CompanyRecord supplier=5;
    double term=6;
    string remark=7;
    TypeRecord purchase_type=8;
    google.protobuf.Timestamp transaction_date=9;
    repeated StockTransactionRecord list=10;
    repeated PaymentRecord payment_list=11;
    PersonRecord sales_rep=12;
    string where=13;
    google.protobuf.Timestamp date_created=14;
    string supplier_sales_id=15;
}

message PurchaseRecordList {
    wpObject base=1;
    google.protobuf.Timestamp from_date=2;
    google.protobuf.Timestamp to_date=3;
    string limit=4;
    string offset=5;
    string purchase_type_id=6;
    repeated PurchaseRecord list=7;
    string id=8;
}

message HistoricalPurchaseRecord {
    CompanyRecord base=1;
    google.protobuf.Timestamp transaction_date=2;
    string ref_no=3;
    string pack=4;
    double quantity=5;
    double bonus_qty=6;
    double price=7;
    double amount=8;
    double discount=9;
    double qoh_balance=10;
    string batch_no=11;
    google.protobuf.Timestamp expiry_date=12;
    string location=13;
    string bonus_pack=14;
    string qty_display=15;
    string who=16;
    string transaction_id=17;
    PersonRecord sales_rep=18;
    string where=19;
    google.protobuf.Timestamp date_created=20;

}

message HistoricalSalesRecord {
    MembershipRecord base=1;
    google.protobuf.Timestamp transaction_date=2;
    string ref_no=3;
    string pack=4;
    double quantity=5;
    double price=6;
    double amount=7;
    double bonus_qty=8;
    string bonus_pack=9;
    string location=10;
    string who=11;
    PersonRecord promoter=12;
    string where=13;
    double cost_price=14;
    string transaction_id=15;
    google.protobuf.Timestamp date_created=16;
    string batch_no=17;
    google.protobuf.Timestamp expiry_date=18;
}

message HistoricalStockRecordList {
    EntityRecord base=1;
    repeated HistoricalStockRecord list=3;
}

message StockRecordList {
    wpObject base=1;
    repeated StockRecord list=3;
}

message InventoryStatusRecord {
    StockRecord base=1;
    string month=2;
    double quantity_in=3;
    double quantity_out_wholesales=4;
    double quantity_adj=5;
    double running_total=6;
    double quantity_out_retail=7;
}

message InventoryStatusRecordByOutlet {
    StockRecord base=1;
    string where=2;
}

message MembershipPointRecord {
    wpObject base=1;
    int64 row_id=2;
    google.protobuf.Timestamp transaction_date=3;
    string receipt_no=4;
    double amount=5;
    double points=6;
    double balance=7;
    string where=8;
    string member_id=9;

}

message MembershipPointRecordList {
    MembershipRecord base=1;
    repeated MembershipPointRecord list=3;
}

message AccountingRecord {
    wpObject base=1;
    google.protobuf.Timestamp transaction_date=2;
    string ref_no=3;
    double debit=4;
    double credit=5;
    string remark=6;
}

message AccountingRecordList {
    EntityRecord base=1;
    repeated AccountingRecord list=2;
}

message AccountJournalRecord {
    EntityRecord base=1;
    string invoice=2;
    google.protobuf.Timestamp date=3;
    double inv_amount=4;
    double pay_amount=5;
    string remark=6;
}

message AccountTransactionRecord {
    wpObject base=1;
    string id=2;
    int64 seq_no=3;
    double total_amount=4;
    string note=5;
    string ref_no=6;
    string remark=7;
    google.protobuf.Timestamp transaction_date=8;
    EntityRecord entity_from=9;
    EntityRecord entity_to=10;
    string type=11;  // out or in
    repeated AccountJournalRecord list=12;
}

message AccountTransactionRecordList {
    wpObject base=1;
    google.protobuf.Timestamp from_date=2;
    google.protobuf.Timestamp to_date=3;
    string limit=4; 
    string offset=5;
    repeated AccountTransactionRecord list=6;
}

message StockTransactionRecordList {
    EntityRecord base=1;
    repeated StockTransactionRecord list=2;
}

message HistoricalPurchaseRecordList {
    EntityRecord base=1;
    repeated HistoricalPurchaseRecord list=2;
}

message HistoricalSalesRecordList {
    EntityRecord base=1;
    repeated HistoricalSalesRecord list=2;
}

message CompanyQuotationRecord {
    CompanyRecord base=1;
    double qty=2;
    double qty_bonus=3;
    double cost_price=4;
    string bonus_scheme=6;
    string qoh_string=7;
    double reorder_qty=8;
}

message StockQuotationList { // stock listing of all supplier
    StockRecord base=1;
    repeated CompanyQuotationRecord list=2;
}


message StockQuotationRecord {
    StockRecord base=1;
    double qty=2;
    double qty_bonus=3;
    double cost_price=4;
    string bonus_scheme=6;
    double reorder_qty=7;
}

message CompanyQuotationList { // supplier list all item
    CompanyRecord base=1;
    repeated StockQuotationRecord list=2;
}

message StockBundleRecord {
    StockRecord base=1;
    PackingRecord pack=2;
    double quantity=3;
    double cost_factor=4;
}

message StockBundleList {
    StockRecord base=1;
    repeated StockBundleRecord list=2;
}

message SalesPromotionRecordList {
    EntityRecord base=1;
    repeated SalesPromotionRecord list=2;
}

message InventoryStatusRecordList {
    EntityRecord base=1;
    repeated InventoryStatusRecord list=2;
}

message InventoryStatusRecordByOutletList {
    EntityRecord base=1;
    repeated InventoryStatusRecordByOutlet list=2;
}

message DataPoints {
    string id = 1;
    string key = 2;
    repeated double value=3;
}
message Series{
    wpObject base=1;
    string id=2;
    repeated string label=3;
    repeated DataPoints data=4;
}

message SalesCount {
    EntityRecord base=1;
    int32 number_of_repeat=2;
    double total_quantity=3;
    double total_amount=4;
    google.protobuf.Timestamp earliest_date=5;
    google.protobuf.Timestamp latest_date=6;
}

message MemberRepeatSales {
    MembershipRecord base=1;
    repeated SalesCount stock_list=2;
}

message StockRepeatSales {
    StockRecord base=1;
    repeated SalesCount member_list=2;
}

message CashOutRecord {
    wpObject base=1;
    double amount=2;
    TypeRecord reason=3;
    string reference=4;
    google.protobuf.Timestamp transaction_date=5;
}

message StockCategoryRecord {
    wpObject base=1;
    string id=2;
    string parent_id=3;
    string description=4;
    int32 fav_rating=5;
}

message StockCategory {
    oneof data {
        StockCategoryRecord stock_category =1;
        StockRecord stock_record=2;
    }
    string session_key=3;
}

message StockCategoryList {
    StockCategory node=1;
    repeated StockCategoryList children=2;
}

message MenuSetting {
    string name = 1;
    repeated string home_ids = 2;
